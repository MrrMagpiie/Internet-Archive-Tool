name: Build and Release Windows EXE

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller ArchivePipeline.spec

    # 1. Prepare Artifact 1: The Zip
    - name: Zip the Application
      run: |
        Compress-Archive -Path dist/ArchivePipeline/* -DestinationPath ArchivePipeline-Windows.zip

    # 2. Prepare Artifact 2: The Installer
    - name: Compile Installer
      uses: minicomp/iscc-action@v3
      with:
        iss-file: installer.iss

    # 3. Upload both Artifacts
    - name: Upload Artifacts to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ArchivePipeline-Windows.zip
          Output/ArchivePipeline_Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}