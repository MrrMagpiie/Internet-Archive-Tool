name: Build Windows EXE

on:
  push:
    branches: [ "main" ] # Triggers the build whenever you push to main
  workflow_dispatch:     # Adds a button to GitHub to run it manually

jobs:
  build:
    runs-on: windows-latest # GitHub provides a temporary Windows machine!

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Match your development version

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller LibraryArchive.spec

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LibraryArchive-Windows
        path: dist/LibraryArchive/ # Uploads the finished folder so you can download it